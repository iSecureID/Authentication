<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open App - iSecureID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
        <!-- Success Icon -->
        <div class="mb-6">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">✅ Login Successful!</h1>
            <p class="text-gray-600">Your authentication is complete</p>
        </div>

        <!-- Open App Button -->
        <button id="openAppBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 px-6 rounded-xl hover:from-indigo-700 hover:to-purple-700 transition transform hover:scale-105 shadow-lg mb-4 flex items-center justify-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
            </svg>
            <span>Open Your App</span>
        </button>

        <!-- App Info -->
        <div class="bg-indigo-50 rounded-lg p-4 mb-4">
            <p class="text-sm text-indigo-900 font-semibold mb-1">📱 App Package:</p>
            <code id="packageDisplay" class="text-xs text-indigo-700 font-mono"></code>
        </div>

        <!-- Fallback Option -->
        <details class="text-left">
            <summary class="cursor-pointer text-sm text-gray-600 hover:text-gray-800 font-medium">
                App not opening? Click here
            </summary>
            <div class="mt-3 bg-gray-50 rounded-lg p-4">
                <p class="text-xs text-gray-600 mb-2"><strong>Manual Method:</strong></p>
                <button id="copyDataBtn" class="w-full text-xs bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-900 mb-2">
                    📋 Copy Authentication Data
                </button>
                <p class="text-xs text-gray-500">Then paste it manually in your app</p>
            </div>
        </details>

        <!-- Footer -->
        <p class="text-xs text-gray-400 mt-6">
            Powered by <strong class="text-indigo-600">iSecureID</strong>
        </p>
    </div>

    <script>
        // Get data from sessionStorage
        const packageName = sessionStorage.getItem('auth_package');
        const token = sessionStorage.getItem('auth_token');
        const username = sessionStorage.getItem('auth_username');
        const authId = sessionStorage.getItem('auth_id');
        const email = sessionStorage.getItem('auth_email');

        // Display package name
        document.getElementById('packageDisplay').textContent = packageName;

        // Create deep link
        const deepLinkUrl = `${packageName}://auth?token=${encodeURIComponent(token)}&username=${encodeURIComponent(username)}&auth_id=${encodeURIComponent(authId)}&email=${encodeURIComponent(email)}`;

        console.log('📱 Deep Link URL:', deepLinkUrl);

        // Open app on button click
        document.getElementById('openAppBtn').addEventListener('click', () => {
            console.log('🚀 Attempting to open app...');
            
            // Change button state
            const btn = document.getElementById('openAppBtn');
            btn.innerHTML = `
                <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Opening App...</span>
            `;
            btn.disabled = true;
            
            // Try to open app
            window.location.href = deepLinkUrl;
            
            // Reset button after 3 seconds
            setTimeout(() => {
                btn.innerHTML = `
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                    <span>Try Again</span>
                `;
                btn.disabled = false;
            }, 3000);
        });

        // Copy data fallback
        document.getElementById('copyDataBtn').addEventListener('click', () => {
            const authData = {
                token: token,
                username: username,
                auth_id: authId,
                email: email,
                package_name: packageName
            };
            
            navigator.clipboard.writeText(JSON.stringify(authData, null, 2)).then(() => {
                alert('✅ Authentication data copied to clipboard!\n\nOpen your app and paste the data.');
                document.getElementById('copyDataBtn').textContent = '✅ Copied!';
                
                setTimeout(() => {
                    document.getElementById('copyDataBtn').textContent = '📋 Copy Authentication Data';
                }, 2000);
            });
        });

        // Clear session storage after use
        setTimeout(() => {
            sessionStorage.removeItem('auth_package');
            sessionStorage.removeItem('auth_token');
            sessionStorage.removeItem('auth_username');
            sessionStorage.removeItem('auth_id');
            sessionStorage.removeItem('auth_email');
        }, 5000);
    </script>
</body>
</html>
