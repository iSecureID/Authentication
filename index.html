<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Auth Provider</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96 text-center">
        <!-- Logo / Title -->
        <h2 class="text-2xl font-bold mb-6 text-indigo-600">MyAuth System</h2>

        <!-- Loading View -->
        <div id="loading-view" class="block">
            <p class="text-gray-500">Checking authentication...</p>
        </div>

        <!-- Login View -->
        <div id="login-view" class="hidden">
            <p class="text-gray-600 mb-4">Login to connect with the requested app.</p>
            <button id="google-login-btn" class="w-full bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-600 transition">
                Sign in with Google
            </button>
        </div>

        <!-- Consent / Accept View -->
        <div id="consent-view" class="hidden">
            <div class="mb-4">
                <img id="user-avatar" src="" class="w-16 h-16 rounded-full mx-auto mb-2 border-2 border-indigo-500">
                <p id="user-name" class="font-bold text-lg"></p>
                <p id="user-email" class="text-sm text-gray-500"></p>
            </div>
            <p class="text-gray-700 mb-6 border-t pt-4">
                An external application is requesting access to your profile.
            </p>
            <button id="accept-btn" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition mb-2">
                Accept & Continue
            </button>
            <button id="cancel-btn" class="w-full bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded hover:bg-gray-400 transition">
                Cancel
            </button>
        </div>
    </div>

    <!-- Firebase v10 SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Yahan signInWithPopup ki jagah signInWithRedirect aur getRedirectResult import kiya hai
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // YAHAN APNA FIREBASE CONFIG DAALEIN
        const firebaseConfig = {
  apiKey: "AIzaSyAdZb8GbRCLr0a-eQSl1QEQ8SuOmKQf1So",
  authDomain: "iid-2026.firebaseapp.com",
  databaseURL: "https://iid-2026-default-rtdb.firebaseio.com",
  projectId: "iid-2026",
  storageBucket: "iid-2026.firebasestorage.app",
  messagingSenderId: "96823275377",
  appId: "1:96823275377:web:95460e19e1002dca9a50d0",
  measurementId: "G-711HPBRLNV"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Get URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        // Kyunki redirect hone ke baad URL change ho jata hai, session storage mein save karna zaroori hai
        if (urlParams.get('redirect_uri')) {
            sessionStorage.setItem('redirect_uri', urlParams.get('redirect_uri'));
        }
        const redirectUri = sessionStorage.getItem('redirect_uri');

        // UI Elements
        const viewLoading = document.getElementById('loading-view');
        const viewLogin = document.getElementById('login-view');
        const viewConsent = document.getElementById('consent-view');

        // Check if returning from Google Login Redirect
        getRedirectResult(auth).catch((error) => {
            console.error("Login Redirect Error:", error);
            alert("Login Error: " + error.message);
        });

        // State change listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User logged in hai -> Save profile to Firestore & Show Consent
                await saveUserProfile(user);
                showConsentUI(user);
            } else {
                // User logged in nahi hai -> Show Login Screen
                viewLoading.classList.add('hidden');
                viewLogin.classList.remove('hidden');
            }
        });

        // Google Login Action (Redirect Method for Mobile/Web compatibility)
        document.getElementById('google-login-btn').addEventListener('click', () => {
            // Popup ki jagah ab Redirect use hoga
            signInWithRedirect(auth, provider);
        });

        // Save Data to Firestore
        async function saveUserProfile(user) {
            const userRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(userRef);
            
            let username = user.email.split('@')[0];

            if (!docSnap.exists()) {
                await setDoc(userRef, {
                    uid: user.uid,
                    email: user.email,
                    name: user.displayName,
                    username: username,
                    photoURL: user.photoURL,
                    createdAt: new Date()
                });
            }
        }

        // Show "Accept" Screen
        function showConsentUI(user) {
            viewLoading.classList.add('hidden');
            viewLogin.classList.add('hidden');
            viewConsent.classList.remove('hidden');

            document.getElementById('user-avatar').src = user.photoURL || "https://via.placeholder.com/150";
            document.getElementById('user-name').innerText = user.displayName || "User";
            document.getElementById('user-email').innerText = user.email;

            if(!redirectUri) {
                document.querySelector('#consent-view p').innerText = "Notice: Directly logged in. No external app to redirect to.";
                document.getElementById('accept-btn').disabled = true;
                document.getElementById('accept-btn').classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // Accept Button Action (Redirect back to Third Party App)
        document.getElementById('accept-btn').addEventListener('click', async () => {
            if(!redirectUri) return;

            const idToken = await auth.currentUser.getIdToken();
            const username = auth.currentUser.email.split('@')[0];

            const finalRedirect = `${redirectUri}?token=${idToken}&username=${username}&email=${auth.currentUser.email}`;
            
            // Clear session storage after process
            sessionStorage.removeItem('redirect_uri');
            
            window.location.href = finalRedirect;
        });

        // Cancel Button Action
        document.getElementById('cancel-btn').addEventListener('click', () => {
            if(redirectUri) {
                sessionStorage.removeItem('redirect_uri');
                window.location.href = `${redirectUri}?error=access_denied`;
            } else {
                auth.signOut();
                window.location.reload();
            }
        });
    </script>
</body>
</html>
