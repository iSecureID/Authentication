<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome App (Using iSecureID)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">My Awesome App</h2>
        <p class="text-gray-500 mb-6">Login below to access your dashboard.</p>

        <!-- Ye hai aapka "Login with iSecureID" Button -->
        <button id="isecure-login-btn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded shadow hover:bg-indigo-700 transition flex items-center justify-center gap-2">
            <!-- Ek chhota sa shield/lock icon -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            Login with iSecureID
        </button>

        <!-- Dashboard (Hidden initially) -->
        <div id="dashboard" class="hidden mt-6 bg-green-50 border border-green-200 p-4 rounded text-left">
            <h3 class="text-lg font-bold text-green-800 border-b border-green-200 pb-2 mb-2">Login Successful!</h3>
            <p class="text-sm text-gray-700"><strong>Username:</strong> <span id="display-user" class="text-indigo-600 font-mono"></span></p>
            <p class="text-sm text-gray-700 mt-1"><strong>Auth ID:</strong> <span id="display-authid" class="font-mono"></span></p>
            <button id="logout-btn" class="mt-4 text-xs text-red-500 underline font-bold">Logout App</button>
        </div>
    </div>

    <script>
        // 🔴 YAHAN APNE iSECUREID WALE PAGE KA LINK DAALEIN 🔴
        // Example: "https://your-isecureid-site.com" ya local file ka path jaise "http://127.0.0.1:5500/isecureid.html"
        const ISECURE_PROVIDER_URL = "isecureid.html"; // abhi maine dummy path diya hai, aap apna exact URL daalna!

        // Dusri App ka current URL (Jahan wapas aana hai login hone ke baad)
        const currentAppUrl = window.location.href.split('?')[0]; 

        // 1. Button Click -> Redirect to iSecureID for Authentication
        document.getElementById('isecure-login-btn').addEventListener('click', () => {
            // Hum URL me ?redirect_uri= bhejte hain taaki iSecureID ko pata ho ki login ke baad wapas kahan bhejna hai
            const loginUrl = `${ISECURE_PROVIDER_URL}?redirect_uri=${encodeURIComponent(currentAppUrl)}`;
            window.location.href = loginUrl;
        });

        // 2. Wapas Aane Par -> Check kijiye URL me Token aur Username hai ya nahi (Jo iSecureID ne wapas bheja)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const username = urlParams.get('username');
            const authId = urlParams.get('auth_id');
            const error = urlParams.get('error');

            if (error === 'access_denied') {
                alert("You cancelled the iSecureID login.");
            } else if (token && username) {
                // SUCCESS! User Logged In
                document.getElementById('isecure-login-btn').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                
                document.getElementById('display-user').innerText = "@" + username;
                document.getElementById('display-authid').innerText = authId;

                // URL clean kar do taaki parameters hide ho jayein (optional)
                window.history.replaceState({}, document.title, currentAppUrl);
            }
        };

        // 3. Simple Logout (Client side)
        document.getElementById('logout-btn').addEventListener('click', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
