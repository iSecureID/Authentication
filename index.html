<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Auth Provider</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96 text-center">
        <!-- Logo / Title -->
        <h2 class="text-2xl font-bold mb-6 text-indigo-600">MyAuth System</h2>

        <!-- Loading View -->
        <div id="loading-view" class="block">
            <svg class="animate-spin h-8 w-8 text-indigo-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p id="loading-text" class="text-gray-500">Checking system...</p>
        </div>

        <!-- Login View -->
        <div id="login-view" class="hidden">
            <p class="text-gray-600 mb-4">Login to connect with the requested app.</p>
            <button id="google-login-btn" class="w-full bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-600 transition flex items-center justify-center gap-2">
                Sign in with Google
            </button>
        </div>

        <!-- Consent / Accept View -->
        <div id="consent-view" class="hidden">
            <div class="mb-4">
                <img id="user-avatar" src="" class="w-16 h-16 rounded-full mx-auto mb-2 border-2 border-indigo-500">
                <p id="user-name" class="font-bold text-lg"></p>
                <p id="user-email" class="text-sm text-gray-500"></p>
            </div>
            <p class="text-green-600 font-semibold mb-2">Registration Successful!</p>
            <p class="text-gray-700 mb-6 border-t pt-4">
                An external application is requesting access to your profile.
            </p>
            <button id="accept-btn" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition mb-2">
                Accept & Continue
            </button>
            <button id="cancel-btn" class="w-full bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded hover:bg-gray-400 transition">
                Cancel
            </button>
        </div>
    </div>

    <!-- Firebase v10 SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔥 YAHAN APNA FIREBASE CONFIG ZAROOR DAALEIN 🔥
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        // Yah parameter Google ko force karta hai ki wo humesha Account Select karne ka option de
        provider.setCustomParameters({ prompt: 'select_account' });

        // Get URL Parameters aur Session set karein
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('redirect_uri')) {
            sessionStorage.setItem('redirect_uri', urlParams.get('redirect_uri'));
        }
        const redirectUri = sessionStorage.getItem('redirect_uri');

        const viewLoading = document.getElementById('loading-view');
        const viewLogin = document.getElementById('login-view');
        const viewConsent = document.getElementById('consent-view');
        const loadingText = document.getElementById('loading-text');

        // Check if returning from Google Redirect
        getRedirectResult(auth).then((result) => {
            if(result) {
                loadingText.innerText = "Processing Profile...";
            }
        }).catch((error) => {
            console.error("Redirect Error:", error);
            alert("Google Auth Error: " + error.message);
            viewLoading.classList.add('hidden');
            viewLogin.classList.remove('hidden');
        });

        // State change listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loadingText.innerText = "Registering Data...";
                await saveUserProfile(user);
                showConsentUI(user);
            } else {
                // User not logged in
                viewLoading.classList.add('hidden');
                viewLogin.classList.remove('hidden');
            }
        });

        // Google Login Action
        document.getElementById('google-login-btn').addEventListener('click', () => {
            loadingText.innerText = "Connecting to Google...";
            viewLogin.classList.add('hidden');
            viewLoading.classList.remove('hidden');
            
            try {
                signInWithRedirect(auth, provider);
            } catch(e) {
                alert("Redirect Failed: " + e.message);
            }
        });

        // Save Data to Firestore (Register user)
        async function saveUserProfile(user) {
            try {
                const userRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userRef);
                
                let username = user.email.split('@')[0];

                if (!docSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        name: user.displayName || username,
                        username: username,
                        photoURL: user.photoURL || "",
                        createdAt: new Date()
                    });
                }
            } catch (error) {
                console.error("Database Error:", error);
                alert("Database Error (Is your Firestore Rule fixed?): " + error.message);
            }
        }

        // Show Consent UI
        function showConsentUI(user) {
            viewLoading.classList.add('hidden');
            viewLogin.classList.add('hidden');
            viewConsent.classList.remove('hidden');

            document.getElementById('user-avatar').src = user.photoURL || "https://via.placeholder.com/150";
            document.getElementById('user-name').innerText = user.displayName || "User";
            document.getElementById('user-email').innerText = user.email;

            if(!redirectUri) {
                document.querySelector('#consent-view p.text-gray-700').innerText = "Testing Mode: App is working perfectly. Provide redirect_uri in URL for external app flow.";
                document.getElementById('accept-btn').disabled = true;
                document.getElementById('accept-btn').classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // Accept & Continue
        document.getElementById('accept-btn').addEventListener('click', async () => {
            if(!redirectUri) return;
            
            try {
                const idToken = await auth.currentUser.getIdToken();
                const username = auth.currentUser.email.split('@')[0];
                const finalRedirect = `${redirectUri}?token=${idToken}&username=${username}&email=${auth.currentUser.email}`;
                
                sessionStorage.removeItem('redirect_uri');
                window.location.href = finalRedirect;
            } catch(e) {
                alert("Token generation failed: " + e.message);
            }
        });

        // Cancel
        document.getElementById('cancel-btn').addEventListener('click', () => {
            if(redirectUri) {
                sessionStorage.removeItem('redirect_uri');
                window.location.href = `${redirectUri}?error=access_denied`;
            } else {
                auth.signOut().then(() => window.location.reload());
            }
        });
    </script>
</body>
</html>
